name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 runner is on macos-14 / macos-latest (both label arm64).
          - os: macos-14
            target: darwin-arm64
          # Build on ubuntu-22.04 (glibc 2.35) so the binary runs on 22.04+.
          # 24.04-built binaries would pick up glibc 2.39 and fail on 22.04.
          - os: ubuntu-22.04
            target: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build runtime with PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller -e .
          pyinstaller \
            --name chronicle \
            --onedir \
            --clean \
            --noupx \
            --noconfirm \
            --log-level WARN \
            --collect-submodules chronicle \
            chronicle/_entrypoint.py

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          # Ad-hoc sign the main binary so macOS doesn't kill it for
          # "damaged" (missing LC_CODE_SIGNATURE) on Apple Silicon. This is
          # NOT notarization — it doesn't grant Gatekeeper trust, it just
          # satisfies the ARM64 runtime requirement that all binaries be
          # signed somehow.
          codesign --force --sign - --timestamp=none dist/chronicle/chronicle
          codesign --verify --strict --verbose=2 dist/chronicle/chronicle

      - name: Smoke test frozen binary
        run: |
          ./dist/chronicle/chronicle --version
          ln -sf chronicle dist/chronicle/chronicle-hook
          echo '{}' | ./dist/chronicle/chronicle-hook
          ls -la dist/chronicle/chronicle-hook

      - name: Package tarball
        run: |
          cd dist
          # Rename so the extracted dir name matches the target, avoiding
          # user collisions when multiple releases coexist in the same dir.
          mv chronicle chronicle-${{ matrix.target }}
          tar -czf chronicle-${{ matrix.target }}.tar.gz chronicle-${{ matrix.target }}
          # SHA256 for install-time verification.
          if [ "${{ runner.os }}" = "macOS" ]; then
            shasum -a 256 chronicle-${{ matrix.target }}.tar.gz > chronicle-${{ matrix.target }}.tar.gz.sha256
          else
            sha256sum chronicle-${{ matrix.target }}.tar.gz > chronicle-${{ matrix.target }}.tar.gz.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: chronicle-${{ matrix.target }}
          path: |
            dist/chronicle-${{ matrix.target }}.tar.gz
            dist/chronicle-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List assets
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/chronicle-*.tar.gz
            artifacts/chronicle-*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
